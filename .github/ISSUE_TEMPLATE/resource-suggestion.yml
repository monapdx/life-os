name: Resource suggestion
description: Suggest a reproductive justice resource for inclusion in this list
title: "[Resource Suggestion]: "
labels:
  - resource suggestion
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a resource for **Awesome Reproductive Justice**.

        Please fill out the form as completely as possible so the resource can be reviewed quickly.

        Before submitting, please check that:
        - the resource is relevant to abortion or reproductive justice
        - it is not already listed in the README
        - the link works
        - the description is clear, concise, and neutral in tone

  - type: input
    id: resource_name
    attributes:
      label: Resource name
      description: The official name of the resource, organization, tool, project, podcast, or documentary
      placeholder: e.g. Plan C Pills
    validations:
      required: true

  - type: input
    id: resource_url
    attributes:
      label: Resource URL
      description: Paste the main link you want included
      placeholder: https://example.org
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Suggested category
      description: Choose the section where this resource best fits
      options:
        - Abortion Clinics
        - Abortion Funds
        - Travel & Practical Support
        - Abortion Pills
        - Abortion Stigma
        - Abortion Storytelling
        - Activism & Advocacy
        - Emotional Support
        - Legal Support
        - Laws, Policy & Data
        - Safety & Privacy
        - Repro Justice Podcasts
        - Repro Justice Documentaries
        - Not sure
    validations:
      required: true

  - type: textarea
    id: short_description
    attributes:
      label: Short description
      description: Write a 1-sentence description in the style used in the README
      placeholder: Provides...
    validations:
      required: true

  - type: dropdown
    id: resource_type
    attributes:
      label: Resource type
      description: What kind of thing is this?
      options:
        - Organization
        - Directory
        - Hotline / Helpline
        - Fund
        - Clinic / Provider
        - Educational resource
        - Legal resource
        - Privacy / Security resource
        - Storytelling project
        - Podcast
        - Documentary / Film
        - Research / Data resource
        - Tool / App
        - Other
    validations:
      required: true

  - type: textarea
    id: why_include
    attributes:
      label: Why should this be included?
      description: Briefly explain why this resource is valuable, trustworthy, or uniquely useful
      placeholder: This resource is especially useful because...
    validations:
      required: true

  - type: textarea
    id: audience_scope
    attributes:
      label: Audience, region, or scope
      description: Optional but helpful — note whether the resource is U.S.-specific, international, youth-focused, LGBTQ+ inclusive, BIPOC-focused, region-specific, etc.
      placeholder: e.g. U.S.-focused, serves Texas residents, international access, youth-centered
    validations:
      required: false

  - type: input
    id: social_or_contact
    attributes:
      label: Social link or contact page
      description: Optional secondary link for verification
      placeholder: https://instagram.com/... or https://example.org/contact
    validations:
      required: false

  - type: textarea
    id: additional_notes
    attributes:
      label: Additional notes
      description: Anything else reviewers should know
      placeholder: Optional
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checklist
      options:
        - label: I confirmed this resource is relevant to abortion or reproductive justice
          required: true
        - label: I checked that this resource is not already listed in the README
          required: true
        - label: I confirmed that the link works
          required: true
        - label: I wrote a short description that can be edited for consistency if needed
          required: true
