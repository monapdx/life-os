name: Documentation Improvement
description: Suggest improvements to the README, SPEC, APPROACHES, examples, or contributor guidance.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Use this form to improve the clarity, structure, accessibility, or usefulness of the documentation.

  - type: dropdown
    id: doc_area
    attributes:
      label: Documentation area
      options:
        - README.md
        - SPEC.md
        - APPROACHES.md
        - Examples
        - Contributor guidance
        - Terminology
        - Other
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is unclear or missing?
      description: Describe the problem with the current docs.
      placeholder: The difference between refinement and normalization is still hard to grasp.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: What should be added, rewritten, reorganized, or illustrated?
      placeholder: Add a side-by-side comparison with CSS and one plain-English analogy.
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: Relevant section or quote
      description: Paste the heading, text, or file section if possible.
      placeholder: In SPEC.md under "Declaration"...
    validations:
      required: false

  - type: checkboxes
    id: improvement_type
    attributes:
      label: Improvement type
      options:
        - label: Clarify wording
        - label: Add examples
        - label: Improve structure
        - label: Improve accessibility for non-coders
        - label: Fix inconsistency
        - label: Add contributor guidance