name: Design Contribution
description: Propose visual identity, diagrams, concept graphics, syntax posters, or explanatory visuals.
title: "[Design]: "
labels:
  - design
  - creative
body:
  - type: markdown
    attributes:
      value: |
        re:imagined is concept-heavy, so visual explanations can be extremely valuable.

        Use this form for:
        - logo ideas
        - diagrams
        - syntax posters
        - README graphics
        - concept illustrations
        - visual language systems

  - type: textarea
    id: idea
    attributes:
      label: Design idea
      description: What do you want to create or propose?
      placeholder: A diagram showing how explicit refinement differs from positional shorthand.
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: What would this help communicate?
      description: Explain the communication goal.
      placeholder: It would help non-coders understand the philosophy quickly.
    validations:
      required: true

  - type: input
    id: references
    attributes:
      label: Links or references
      description: Share mockups, inspirations, sketches, or relevant links.
      placeholder: https://...
    validations:
      required: false

  - type: dropdown
    id: asset_type
    attributes:
      label: Asset type
      options:
        - Logo
        - Diagram
        - README graphic
        - Syntax cheat sheet
        - Poster
        - Social card
        - UI mockup
        - Other
    validations:
      required: true

  - type: checkboxes
    id: format
    attributes:
      label: Available deliverables
      options:
        - label: PNG
        - label: SVG
        - label: Figma
        - label: Markdown-embedded graphic
        - label: HTML/CSS version